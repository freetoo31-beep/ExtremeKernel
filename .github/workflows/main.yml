name: Update KernelSU-Next Submodule Pointer (SuSFS Legacy)

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Sync submodule
        run: git submodule sync --recursive

      - name: Initialize submodule
        run: git submodule update --init --force --recursive KernelSU-Next

      - name: Checkout SuSFS Legacy commit
        run: |
          cd KernelSU-Next
          git fetch origin
          # التحديث إلى كود فرع legacy_susfs المتوافق مع أندرويد 15
          git checkout f448093b05ecbf9da4980391459afd0482540a0e
          cd ..

      - name: Commit updated pointer
        run: |
          git add KernelSU-Next
          git commit -m "Update KernelSU-Next to f448093 (SuSFS legacy-next support)" || echo "No changes to commit"
          git push origin main
