name: Nuke Symlink and Setup SuSFS

on:
  workflow_dispatch:

jobs:
  fix-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Destroy Symbolic Link
        run: |
          # حذف الاختصار الوهمي الذي يمنع Git من العمل
          rm -f drivers/kernelsu
          git rm -f drivers/kernelsu || true
          
          # تأكيد مسح أي آثار له من الذاكرة المخفية
          rm -rf .git/modules/drivers/kernelsu || true
          git config --remove-section submodule.drivers/kernelsu || true
          
          # مسح ملف الروابط للبدء من جديد
          rm -f .gitmodules
          touch .gitmodules

      - name: Build Real Submodule
        run: |
          # الآن الطريق سالك لإضافة الموديول الحقيقي
          git submodule add -b legacy_susfs --force https://github.com/Devandroid-bit/KernelSU-Next.git drivers/kernelsu
          
          # الدخول وتحديث كود التخفي
          cd drivers/kernelsu
          git fetch origin
          git checkout f448093b05ecbf9da4980391459afd0482540a0e
          cd ../..

      - name: Commit and Push Victory
        run: |
          git add .gitmodules drivers/kernelsu
          git commit -m "Victory: Nuked symlink, created real drivers/kernelsu at f448093" || echo "No changes to commit"
          git push origin main
