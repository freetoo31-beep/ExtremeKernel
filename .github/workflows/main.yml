name: Update KernelSU-Next Submodule Pointer

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Sync submodule
        run: git submodule sync --recursive

      - name: Initialize submodule
        run: git submodule update --init --force --recursive KernelSU-Next

      - name: Checkout desired commit
        run: |
          cd KernelSU-Next
          git fetch origin
          git checkout 03b45faad66a3d601a54fae32cef737cde162365
          cd ..

      - name: Commit updated pointer
        run: |
          git add KernelSU-Next
          git commit -m "Update KernelSU-Next to 03b45fa (hardcoded 3.1.0-legacy)" || echo "No changes to commit"
          git push origin main
