name: Final SuSFS Submodule Setup

on:
  workflow_dispatch:

jobs:
  ultimate-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Clean Slate (مسح أي أخطاء متبقية)
        run: |
          # تنظيف كامل للذاكرة لضمان عدم وجود تضارب
          git rm -rf --cached KernelSU-Next || true
          git rm -rf --cached drivers/kernelsu || true
          rm -rf KernelSU-Next drivers/kernelsu .gitmodules
          rm -rf .git/modules/KernelSU-Next .git/modules/drivers/kernelsu
          git add -A
          git commit -m "Clean slate for correct SuSFS commit" || true

      - name: Add Real Submodule & Checkout
        run: |
          # إضافة الموديول بشكل صحيح
          git submodule add -b legacy_susfs --force https://github.com/Devandroid-bit/KernelSU-Next.git drivers/kernelsu
          
          # الدخول واستخدام الكود الصحيح الذي أحضرته أنت!
          cd drivers/kernelsu
          git fetch origin
          git checkout ba4422f0556e10f40dda1887631d87a18ede4ec5
          cd ../..

      - name: Commit and Push Victory
        run: |
          git commit -m "JABAR FIX: Successfully added drivers/kernelsu at ba4422f" || true
          git push origin main
