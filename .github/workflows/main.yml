name: Nuclear Git Cleanup (Submodule Remover)

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Nuclear Cleanup Action
        run: |
          echo "1. Removing submodule from Git index..."
          git rm -rf --cached drivers/kernelsu || true
          
          echo "2. Deleting physical files and symlinks..."
          rm -rf drivers/kernelsu
          rm -rf .git/modules/drivers/kernelsu
          
          echo "3. Cleaning .gitmodules file..."
          if [ -f .gitmodules ]; then
            # حذف القسم الخاص بـ kernelsu من ملف الموديولات
            sed -i '/\[submodule "drivers\/kernelsu"\]/,+3d' .gitmodules || true
            # إذا أصبح الملف فارغاً، احذفه تماماً
            [ -s .gitmodules ] || rm .gitmodules
          fi

          echo "4. Finalizing changes..."
          git add -A
          git commit -m "NUCLEAR CLEANUP: Removed all gitlinks and submodules for kernelsu" || true
          git push origin main
