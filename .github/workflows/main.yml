name: Force Update and Fix SuSFS Submodule

on:
  workflow_dispatch:

jobs:
  fix-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Deep Cleanup (تنظيف عميق للملفات المؤقتة والمجلدات)
        run: |
          # مسح أي ملفات مخفية أو روابط قديمة تعيق العملية
          git rm -rf KernelSU-Next || true
          git rm -rf drivers/kernelsu || true
          rm -rf .git/modules/KernelSU-Next || true
          rm -rf .git/modules/drivers/kernelsu || true
          rm -f .gitmodules

      - name: Add Submodule and Checkout (إضافة وتحديث مباشر)
        run: |
          # إضافة الموديول الجديد بشكل صريح إلى المسار الصحيح
          git submodule add -b legacy_susfs --force https://github.com/Devandroid-bit/KernelSU-Next.git drivers/kernelsu
          
          # الدخول للمجلد وتحديث الكود لنسخة التخفي
          cd drivers/kernelsu
          git fetch origin
          git checkout f448093b05ecbf9da4980391459afd0482540a0e
          cd ../..

      - name: Commit and Push (حفظ التغييرات)
        run: |
          git add .gitmodules drivers/kernelsu
          git commit -m "Force fix submodule: drivers/kernelsu updated to f448093 (SuSFS)" || echo "No changes to commit"
          git push origin main
