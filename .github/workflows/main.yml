name: Update KernelSU-Next Submodule Pointer and Patch Version

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Sync submodule
        run: git submodule sync

      - name: Initialize submodule
        run: git submodule update --init --recursive KernelSU-Next

      - name: Checkout v3.1.0-legacy tag
        run: |
          cd KernelSU-Next
          git fetch --tags
          git checkout tags/v3.1.0-legacy -b v3.1.0-legacy
          cd ..

      - name: Patch Makefile to hardcode KSU_VERSION
        run: |
          FILE=KernelSU-Next/Makefile
          # Backup original
          cp $FILE $FILE.bak
          # Overwrite the dynamic version block
          awk 'BEGIN{skip=0} 
               /ifdef KSU_GIT_VERSION_VALID/{print "KSU_VERSION := 33100  # for 3.1.0-legacy\nccflags-y += -DKSU_VERSION=$(KSU_VERSION)\n$(info -- KernelSU-Next version: 3.1.0-legacy)"; skip=5; next} 
               {if(skip>0){skip--; next} print}' $FILE > $FILE.tmp && mv $FILE.tmp $FILE

      - name: Commit updated pointer and patch
        run: |
          git add KernelSU-Next
          git commit -m "Update KernelSU-Next to v3.1.0-legacy and hardcode KSU_VERSION=33100" || echo "No changes to commit"
          git push origin main
