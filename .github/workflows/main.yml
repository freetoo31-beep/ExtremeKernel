name: Setup Clean SuSFS Submodule

on:
  workflow_dispatch:

jobs:
  fix-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Create .gitmodules
        run: |
          touch .gitmodules
          git add .gitmodules

      - name: Add Submodule and Checkout
        run: |
          # إضافة الموديول الجديد بشكل صريح إلى المسار الصحيح
          git submodule add -b legacy_susfs --force https://github.com/Devandroid-bit/KernelSU-Next.git drivers/kernelsu
          
          # الدخول للمجلد وتحديث الكود لنسخة التخفي
          cd drivers/kernelsu
          git fetch origin
          git checkout f448093b05ecbf9da4980391459afd0482540a0e
          cd ../..

      - name: Commit and Push
        run: |
          git add .gitmodules drivers/kernelsu
          git commit -m "Successfully added drivers/kernelsu at f448093 (SuSFS)" || echo "No changes to commit"
          git push origin main
