name: Update KernelSU-Next to v3.1.0

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Sync submodule
        run: git submodule sync

      - name: Initialize submodule
        run: git submodule update --init KernelSU-Next

      - name: Checkout tag v3.1.0 inside submodule
        run: |
          cd KernelSU-Next
          git fetch --tags
          git checkout v3.1.0
          cd ..

      - name: Commit updated pointer
        run: |
          git add KernelSU-Next
          git commit -m "Update KernelSU-Next to v3.1.0" || echo "No changes"
          git push origin main
