name: Setup Latest SuSFS Submodule

on:
  workflow_dispatch:

jobs:
  fix-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "Devandroid-bit"
          git config user.email "samirmami533@gmail.com"

      - name: Memory Wipe (تنظيف الروابط المعطوبة)
        run: |
          git rm -rf --cached KernelSU-Next || true
          git rm -rf --cached drivers/kernelsu || true
          rm -rf KernelSU-Next drivers/kernelsu .gitmodules
          rm -rf .git/modules/KernelSU-Next .git/modules/drivers/kernelsu
          git add -A
          git commit -m "Wipe broken submodules to prepare for the latest code" || true

      - name: Add Latest Submodule (سحب أحدث كود محدث)
        run: |
          # إضافة الموديول وسحب أحدث أكواد فرع legacy_susfs التلقائياً
          git submodule add -b legacy_susfs --force https://github.com/Devandroid-bit/KernelSU-Next.git drivers/kernelsu
          
          # الدخول للمجلد والتأكد من سحب أحدث تغييرات الرابط المحدث
          cd drivers/kernelsu
          git fetch origin
          git checkout legacy_susfs
          git pull origin legacy_susfs
          cd ../..

      - name: Commit and Push Victory
        run: |
          git add .gitmodules drivers/kernelsu
          git commit -m "Successfully added latest drivers/kernelsu from updated legacy_susfs branch" || echo "No changes to commit"
          git push origin main
