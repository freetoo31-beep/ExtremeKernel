name: ExtremeKernel Build (Final Production)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "اختر موديل الجهاز للطبخ"
        required: true
        default: "d2s"
        type: choice
        options:
        - all
        - d1
        - d1xks
        - d2s
        - d2x
        - d2xks

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      should_build_all: ${{ github.event.inputs.model == 'all' }}
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: [d1, d1xks, d2s, d2x, d2xks]
    
    steps:
      # التحقق: هل هذا الموديل هو المطلوب بناؤه؟
      - name: Check if build is needed
        id: check
        run: |
          if [[ "${{ github.event.inputs.model }}" == "all" || "${{ github.event.inputs.model }}" == "${{ matrix.model }}" ]]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Kernel Source
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Prepare KernelSU-Next & SuSFS Paths
        if: steps.check.outputs.proceed == 'true'
        run: |
          if [ -d "drivers/kernelsu" ]; then
            mv drivers/kernelsu drivers/KernelSU-Next-Source
            ln -sf KernelSU-Next-Source/kernel drivers/kernelsu
            echo "✅ KernelSU paths prepared successfully."
          else
            echo "❌ Error: drivers/kernelsu not found. Run main.yml first!"
            exit 1
          fi

      - name: Build ExtremeKernel (${{ matrix.model }})
        if: steps.check.outputs.proceed == 'true'
        run: |
          yes "" | ./workflows.sh -m ${{ matrix.model }} -k Y -r N

      - name: Upload Flashable Kernel ZIP
        if: steps.check.outputs.proceed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKRNL-Nexus-${{ matrix.model }}-SuSFS-v2
          path: build/out/${{ matrix.model }}/zip/*.zip
