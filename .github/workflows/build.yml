name: ExtremeKernel Build (Manual Drivers)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "اختر موديل الجهاز للطبخ"
        required: true
        default: "d2s"
        type: choice
        options:
        - all
        - d1
        - d1xks
        - d2s
        - d2x
        - d2xks

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: [d1, d1xks, d2s, d2x, d2xks]

    steps:
      - name: Check if build is needed
        id: check
        run: |
          if [[ "${{ github.event.inputs.model }}" == "all" || "${{ github.event.inputs.model }}" == "${{ matrix.model }}" ]]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Kernel Source
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        if: steps.check.outputs.proceed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libssl-dev bc

      # 👉 هذه هي الخطوة السحرية الجديدة لحل مشكلة (الإصدار 1) 👈
      - name: Force KernelSU Version 32315
        if: steps.check.outputs.proceed == 'true'
        run: |
          echo "Injecting KernelSU version 32315 into Makefiles..."
          find drivers/ -type f -name "Makefile" -path "*/kernelsu*" -exec sh -c 'echo "ccflags-y += -DKSU_VERSION=32315" >> "$1"' _ {} \;
          echo "Done!"

      - name: Build ExtremeKernel (${{ matrix.model }})
        if: steps.check.outputs.proceed == 'true'
        run: |
          chmod +x workflows.sh
          yes "" | ./workflows.sh -m ${{ matrix.model }} -k Y -r N

      - name: Upload Flashable Kernel
        if: steps.check.outputs.proceed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKRNL-Nexus-${{ matrix.model }}-SuSFS-v2
          path: build/out/**/*.zip
          if-no-files-found: error
