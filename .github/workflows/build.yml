name: ExtremeKernel - Legacy SuSFS Edition

on:
  workflow_dispatch:
    inputs:
      model:
        description: "اختر موديل الجهاز للطبخ"
        required: true
        default: "d2s"
        type: choice
        options:
        - all
        - d1
        - d1xks
        - d2s
        - d2x
        - d2xks

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: [d1, d1xks, d2s, d2x, d2xks]

    steps:
      # 1. التحقق من الموديل
      - name: Check if build is needed
        id: check
        run: |
          if [[ "${{ github.event.inputs.model }}" == "all" || "${{ github.event.inputs.model }}" == "${{ matrix.model }}" ]]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

      # 2. تحميل كود الكيرنل
      - name: Checkout Kernel Source
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 3. تثبيت أدوات البناء
      - name: Install Dependencies
        if: steps.check.outputs.proceed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libssl-dev bc

      # 4. حقن الإعدادات والاسم (علاج المشاكل يدوياً)
      - name: Fix Headers & Set Stealth
        if: steps.check.outputs.proceed == 'true'
        run: |
          echo "Processing ${{ matrix.model }}..."
          
          # أ- تفعيل خيارات SuSFS في الـ defconfig
          find arch/arm64/configs/ -name "*${{ matrix.model }}*_defconfig" -exec sh -c '
            echo "CONFIG_KSU_SUSFS=y" >> "$1"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$1"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$1"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$1"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$1"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=n" >> "$1"
          ' _ {} \;

          # ب- ضبط رقم الإصدار والاسم legacy_susfs (تنظيف الرموز المخفية آلياً)
          KSU_H="drivers/kernelsu/ksu.h"
          sed -i 's/#define KSU_VERSION .*/#define KSU_VERSION 33100/' $KSU_H
          sed -i 's/#define KSU_VERSION_TAG .*/#define KSU_VERSION_TAG "legacy_susfs"/' $KSU_H
          
          echo "Injection Done!"

      # 5. تشغيل عملية البناء
      - name: Build Kernel (${{ matrix.model }})
        if: steps.check.outputs.proceed == 'true'
        run: |
          chmod +x workflows.sh
          export KSU_VERSION=33100
          yes "" | ./workflows.sh -m ${{ matrix.model }} -k Y -r N

      # 6. رفع ملف الـ ZIP
      - name: Upload Kernel Artifact
        if: steps.check.outputs.proceed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKRNL-${{ matrix.model }}-Legacy-SuSFS
          path: build/out/**/*.zip
          if-no-files-found: error
